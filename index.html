        this.mining = { blockPos: hit.blockPos, startTime: this.clock.getElapsedTime(), blockType };
        this.handSwinging = true;
        this.handSwing = 0;
    }

    _stopMining() {
        this.mining = null;
        document.getElementById('miningProgress').classList.remove('show');
    }

    _updateMining() {
        if (!this.mining) return;
        // Re-raycast tiap frame untuk pastikan player masih menghadap blok yang sama (gaya Minecraft)
        const origin = this.camera.position;
        const dir = this._getLookDirection();
        const hit = this.world.raycast(origin, dir, 6);
        if (!hit || hit.blockPos.x !== this.mining.blockPos.x || hit.blockPos.y !== this.mining.blockPos.y || hit.blockPos.z !== this.mining.blockPos.z) {
            this._stopMining();
            return;
        }

        const data = BLOCK_DATA[this.mining.blockType];
        const duration = this.miningDuration * Math.max(0.3, data.hardness);
        const elapsed = this.clock.getElapsedTime() - this.mining.startTime;
        const progress = Math.min(1, elapsed / duration);

        const progressBar = document.getElementById('miningProgress');
        progressBar.classList.add('show');
        document.getElementById('miningProgressFill').style.width = (progress * 100) + '%';

        if (progress >= 1) {
            const { x, y, z } = this.mining.blockPos;
            this.world.setBlock(x, y, z, BLOCK.AIR);
            this.particles.spawnBreakParticles(x, y, z, this.mining.blockType);
            this._stopMining();
        }
    }

    _placeBlock() {
        const origin = this.camera.position;
        const dir = this._getLookDirection();
        const hit = this.world.raycast(origin, dir, 6);
        if (!hit) return;

        const placePos = hit.placePos;
        // Pastikan tidak menempatkan blok di posisi yang overlap dengan player sendiri
        const playerAABB = this.player.getAABB();
        if (placePos.x + 1 > playerAABB.minX && placePos.x < playerAABB.maxX &&
            placePos.y + 1 > playerAABB.minY && placePos.y < playerAABB.maxY &&
            placePos.z + 1 > playerAABB.minZ && placePos.z < playerAABB.maxZ) {
            return;
        }

        const blockType = this.hotbarSlots[this.selectedSlot];
        if (blockType === undefined) return;
        this.world.setBlock(placePos.x, placePos.y, placePos.z, blockType);
        this.handSwinging = true;
        this.handSwing = 0;
    }

    // ===================== UI: HOTBAR =====================
    _buildHotbarUI() {
        const hotbar = document.getElementById('hotbar');
        hotbar.innerHTML = '';
        this.hotbarSlots.forEach((blockType, i) => {
            const slot = document.createElement('div');
            slot.className = 'hotbarSlot';
            slot.dataset.index = i;
            const numLabel = document.createElement('div');
            numLabel.className = 'slotNum';
            numLabel.textContent = (i + 1) % 10;
            slot.appendChild(numLabel);
            const icon = this._createBlockIcon(blockType);
            if (icon) slot.appendChild(icon);
            slot.addEventListener('click', () => {
                this.selectedSlot = i;
                this._updateHotbarHighlight();
            });
            hotbar.appendChild(slot);
        });
        this._updateHotbarHighlight();
    }

    _updateHotbarHighlight() {
        const slots = document.querySelectorAll('.hotbarSlot');
        slots.forEach((slot, i) => {
            slot.classList.toggle('selected', i === this.selectedSlot);
        });
        const tooltip = document.getElementById('blockTooltip');
        const type = this.hotbarSlots[this.selectedSlot];
        const data = BLOCK_DATA[type];
        if (data) {
            tooltip.textContent = data.name;
            tooltip.classList.add('show');
            clearTimeout(this._tooltipTimeout);
            this._tooltipTimeout = setTimeout(() => tooltip.classList.remove('show'), 1200);
        }
    }

    // Membuat icon kecil 2D (canvas) merepresentasikan warna dasar blok, untuk slot UI
    _createBlockIcon(blockType) {
        const data = BLOCK_DATA[blockType];
        if (!data) return null;
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        // Sumber warna disamakan dengan colorMap particle agar konsisten secara visual
        const colorMap = {
            [BLOCK.GRASS]: '#5a9a3e', [BLOCK.DIRT]: '#86603f', [BLOCK.STONE]: '#808082',
            [BLOCK.SAND]: '#ded196', [BLOCK.WOOD]: '#9c7548', [BLOCK.LEAVES]: '#3a6e28',
            [BLOCK.GLASS]: '#b4dce6', [BLOCK.SNOW]: '#f0f5fa', [BLOCK.SNOW_GRASS]: '#eaf0f5',
            [BLOCK.PLANK]: '#ba8c5a', [BLOCK.BEDROCK]: '#282828', [BLOCK.CACTUS]: '#3c8246',
            [BLOCK.ICE]: '#aad2e6', [BLOCK.WATER]: '#3778d2'
        };
        ctx.fillStyle = colorMap[blockType] || '#999999';
        ctx.fillRect(2, 2, 28, 28);
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.strokeRect(2, 2, 28, 28);
        return canvas;
    }

    // ===================== UI: HEALTH (HEARTS) =====================
    _buildHealthUI() {
        const container = document.getElementById('healthBar');
        container.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.dataset.index = i;
            heart.innerHTML = this._heartSVG(true);
            container.appendChild(heart);
        }
    }

    _heartSVG(full) {
        const color = full ? '#e0302d' : '#3a3a3a';
        return `<svg viewBox="0 0 16 16"><path fill="${color}" stroke="#000" stroke-width="0.8" d="M8 14 1 7.5C-1 5 1 1.5 4 1.5c1.8 0 3 1 4 2.5 1-1.5 2.2-2.5 4-2.5 3 0 5 3.5 3 6L8 14z"/></svg>`;
    }

    // Armor bar sederhana di atas hotbar (gaya Minecraft: ikon perisai/armor).
    // Karena permainan ini tidak punya sistem armor crafting penuh, nilai armor
    // ditampilkan statis sebagai representasi visual sesuai permintaan UI.
    _buildStatusBarUI() {
        const container = document.getElementById('statusBar');
        container.innerHTML = '';
        const armorLevel = 10; // representasi visual statis (10 ikon penuh)
        for (let i = 0; i < 10; i++) {
            const icon = document.createElement('div');
            icon.className = 'armorIcon';
            const full = i < armorLevel;
            const color = full ? '#b8b8b8' : '#3a3a3a';
            icon.innerHTML = `<svg viewBox="0 0 16 16"><path fill="${color}" stroke="#000" stroke-width="0.8" d="M8 1 13 3v5c0 4-2.5 6.5-5 7-2.5-0.5-5-3-5-7V3z"/></svg>`;
            container.appendChild(icon);
        }
    }

    _updateHealthUI() {
        const hearts = document.querySelectorAll('.heart');
        const healthPerHeart = 2;
        hearts.forEach((heart, i) => {
            const heartValue = (i + 1) * healthPerHeart;
            heart.innerHTML = this._heartSVG(this.player.health >= heartValue);
        });

        // Vignette merah saat HP rendah
        const vignette = document.getElementById('damageVignette');
        vignette.classList.toggle('show', this.player.health <= 6);
    }

    // ===================== UI: INVENTORY =====================
    _buildInventoryUI() {
        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = '';
        this.inventoryBlocks.forEach((blockType) => {
            const data = BLOCK_DATA[blockType];
            if (!data) return;
            const slot = document.createElement('div');
            slot.className = 'invSlot';
            slot.title = data.name;
            const icon = this._createBlockIcon(blockType);
            if (icon) slot.appendChild(icon);
            slot.addEventListener('click', () => {
                // Klik item di inventory -> taruh ke slot hotbar yang sedang aktif
                this.hotbarSlots[this.selectedSlot] = blockType;
                this._buildHotbarUI();
            });
            grid.appendChild(slot);
        });
    }

    _toggleInventory() {
        this.isInventoryOpen = !this.isInventoryOpen;
        document.getElementById('inventoryScreen').classList.toggle('active', this.isInventoryOpen);
        if (this.isInventoryOpen) {
            document.exitPointerLock();
        }
    }

    _togglePause() {
        if (!this.world) return;
        this.isPaused = !this.isPaused;
        document.getElementById('pauseMenu').classList.toggle('active', this.isPaused);
        if (this.isPaused) {
            document.exitPointerLock();
        }
    }

    _showHUD(show) {
        document.getElementById('hud').classList.toggle('active', show);
    }

    // ===================== SAVE / LOAD (localStorage) =====================
    saveGame() {
        if (!this.world || !this.player) return false;
        try {
            const saveData = {
                seed: this.world.seed,
                playerPos: this.player.position,
                playerYaw: this.player.yaw,
                playerPitch: this.player.pitch,
                playerHealth: this.player.health,
                hotbarSlots: this.hotbarSlots,
                chunks: this.world.serializeWorld(),
                timeOfDay: this.environment.time,
                savedAt: Date.now()
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
            return true;
        } catch (err) {
            console.error('Gagal menyimpan game:', err);
            return false;
        }
    }

    loadGame() {
        try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return false;
            const saveData = JSON.parse(raw);

            this._teardownWorld();
            this.scene = new THREE.Scene();
            this.world = new World(this.scene, saveData.seed, 4);
            this.environment = new Environment(this.scene);
            this.particles = new ParticleSystem(this.scene);
            this.player = new Player(this.world, this.camera);

            this.world.loadWorldData(saveData.chunks);
            this.player.position = saveData.playerPos;
            this.player.yaw = saveData.playerYaw || 0;
            this.player.pitch = saveData.playerPitch || 0;
            this.player.health = saveData.playerHealth !== undefined ? saveData.playerHealth : 20;
            this.hotbarSlots = saveData.hotbarSlots || HOTBAR_BLOCKS.slice(0, 9);
            this.environment.time = saveData.timeOfDay || 0;

            this._buildHotbarUI();
            this._showHUD(true);
            return true;
        } catch (err) {
            console.error('Gagal memuat game:', err);
            return false;
        }
    }

    static hasSaveGame() {
        return localStorage.getItem(SAVE_KEY) !== null;
    }

    // ===================== HAND / TOOL VIEWMODEL ANIMATION =====================
    _updateHandSwing(dt) {
        if (this.handSwinging) {
            this.handSwing += dt * 6; // kecepatan animasi ayunan
            if (this.handSwing >= 1) {
                this.handSwing = 0;
                this.handSwinging = false;
            }
        }
        const handEl = document.getElementById('handContainer');
        if (handEl) {
            // Animasi ayunan sederhana: rotasi & translasi berbasis sin curve
            const swingAngle = Math.sin(this.handSwing * Math.PI) * 35;
            const swingOffset = Math.sin(this.handSwing * Math.PI) * 20;
            handEl.style.transform = `rotate(${-swingAngle}deg) translate(${swingOffset * 0.3}px, ${-swingOffset}px)`;
        }
    }

    // ===================== DEBUG INFO =====================
    _updateDebugInfo() {
        const el = document.getElementById('debugInfo');
        if (!el || !this.player) return;
        const p = this.player.position;
        el.innerHTML = `
            XYZ: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}<br>
            Chunks loaded: ${this.world.chunks.size}<br>
            Flying: ${this.player.isFlying} | In Water: ${this.player.isInWater}<br>
            FPS: ${this.currentFPS || 0}
        `;
    }

    // ===================== GAME LOOP UTAMA =====================
    start() {
        this.clock.start();
        this._lastFrameTime = performance.now();
        this._fpsAccumTime = 0;
        this._fpsAccumFrames = 0;
        this.currentFPS = 60;
        this._loop();
    }

    _loop() {
        requestAnimationFrame(() => this._loop());
        const dt = this.clock.getDelta();

        // Hitung FPS sederhana untuk debug info
        this._fpsAccumTime += dt;
        this._fpsAccumFrames++;
        if (this._fpsAccumTime >= 0.5) {
            this.currentFPS = Math.round(this._fpsAccumFrames / this._fpsAccumTime);
            this._fpsAccumTime = 0;
            this._fpsAccumFrames = 0;
        }

        if (!this.world || !this.player) {
            this.renderer.render(this.scene, this.camera);
            return;
        }

        if (!this.isPaused && !this.isInventoryOpen) {
            this.player.update(dt, this.input);
            this.world.update(this.player.position.x, this.player.position.z);
            this.environment.update(dt, this.player.position);
            this.particles.update(dt);
            this._updateMining();
        }

        this._updateHandSwing(dt);
        this._updateHealthUI();
        this._updateDebugInfo();

        // Overlay underwater
        document.getElementById('waterOverlay').classList.toggle('show', this.player.isInWater);

        this.renderer.render(this.scene, this.camera);
    }
}


// ===================== BOOTSTRAP / ENTRY POINT =====================
// Menjalankan inisialisasi awal: loading screen, lalu menampilkan main menu.
// Game instance dibuat sekali, dunia baru/load dibuat saat user menekan tombol di main menu.

let game = null;

function simulateLoadingProgress(onDone) {
    const bar = document.getElementById('loadingBarInner');
    const text = document.getElementById('loadingText');
    const steps = [
        { pct: 25, msg: 'Memuat Three.js engine...' },
        { pct: 50, msg: 'Membangun texture atlas...' },
        { pct: 75, msg: 'Menyiapkan dunia...' },
        { pct: 100, msg: 'Selesai!' }
    ];
    let i = 0;
    function next() {
        if (i >= steps.length) { onDone(); return; }
        const step = steps[i++];
        bar.style.width = step.pct + '%';
        text.textContent = step.msg;
        setTimeout(next, 220);
    }
    next();
}

window.addEventListener('DOMContentLoaded', () => {
    // Buat instance Game di awal (constructor-nya hanya inisialisasi renderer/listener, belum bikin dunia)
    try {
        game = new Game();
    } catch (err) {
        console.error('Gagal inisialisasi game:', err);
        document.getElementById('loadingText').textContent = 'Error: Browser Anda mungkin tidak mendukung WebGL.';
        return;
    }

    simulateLoadingProgress(() => {
        document.getElementById('loadingScreen').classList.add('hidden');

        // Tampilkan tombol "Lanjutkan Permainan Tersimpan" hanya jika ada save data
        const loadBtn = document.getElementById('btnLoadGame');
        if (!Game.hasSaveGame()) {
            loadBtn.style.opacity = '0.5';
            loadBtn.style.cursor = 'not-allowed';
            loadBtn.title = 'Belum ada permainan tersimpan';
        }

        game.start(); // mulai game loop (render terus berjalan meski masih di main menu, menampilkan scene kosong)
    });
});

// Mencegah klik kanan menampilkan context menu browser di seluruh halaman (agar interaksi "klik kanan = pasang blok" mulus)
window.addEventListener('contextmenu', (e) => {
    if (game && game.world) e.preventDefault();
});

</script>
