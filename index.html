<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frozen Food D'has</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
transition:0.5s;
}
header{
background:linear-gradient(90deg,#1e3a8a,#2563eb);
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
letter-spacing:1px;
}
.container{
padding:20px;
display:none;
}
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}
button{
background:#2563eb;
border:none;
padding:10px 15px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}
button:hover{
background:#1d4ed8;
}
#welcome{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#1e3a8a,#9333ea);
}
input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:none;
}
.cart{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:12px;
border-radius:50%;
cursor:pointer;
}
.back{
margin-bottom:10px;
background:#475569;
}
.darkmode{
position:fixed;
top:15px;
right:15px;
cursor:pointer;
}
</style>
</head>
<body>

<header>🧊 FROZEN FOOD D'HAS</header>

<div class="darkmode" onclick="toggleDark()">🌙</div>

<div id="welcome">
<h1>Selamat Datang 👋</h1>
<p>Toko Frozen Food Premium</p>
<button onclick="enterShop()">Masuk Toko</button>
</div>

<div class="container" id="shop">

<button class="back" onclick="goHome()">⬅ Kembali</button>

<h2>Produk Pilihan</h2>

<div class="card">
<h3>Nugget Ayam</h3>
<p>Rp25.000</p>
<button onclick="addCart('Nugget Ayam',25000)">Tambah</button>
</div>

<div class="card">
<h3>Sosis Sapi</h3>
<p>Rp30.000</p>
<button onclick="addCart('Sosis Sapi',30000)">Tambah</button>
</div>

<div class="card">
<h3>Kentang Goreng</h3>
<p>Rp20.000</p>
<button onclick="addCart('Kentang Goreng',20000)">Tambah</button>
</div>

<h2>Checkout</h2>

<input type="text" id="nama" placeholder="Nama Anda">
<input type="text" id="alamat" placeholder="Alamat Lengkap">
<p>Total: Rp <span id="total">0</span></p>

<button onclick="checkout()">Pesan via WhatsApp</button>

</div>

<div class="cart" onclick="alert('Total: Rp '+total)">🛒</div>

<script>
let total=0;
let cart=[];

function enterShop(){
document.getElementById('welcome').style.display='none';
document.getElementById('shop').style.display='block';
alert("Selamat berbelanja di Frozen Food D'has 🔥");
}

function goHome(){
document.getElementById('shop').style.display='none';
document.getElementById('welcome').style.display='flex';
}

function addCart(nama,harga){
cart.push(nama);
total+=harga;
document.getElementById('total').innerText=total;
}

function checkout(){
let nama=document.getElementById('nama').value;
let alamat=document.getElementById('alamat').value;

if(nama==""||alamat==""){
alert("Isi data dulu ya!");
return;
}

let pesan="Halo Frozen Food D'has%0A";
pesan+="Nama: "+nama+"%0A";
pesan+="Alamat: "+alamat+"%0A";
pesan+="Pesanan: "+cart.join(", ")+"%0A";
pesan+="Total: Rp "+total;

window.open("https://wa.me/6285716075774?text="+pesan);
}

function toggleDark(){
if(document.body.style.background=="white"){
document.body.style.background="#0f172a";
document.body.style.color="white";
}else{
document.body.style.background="white";
document.body.style.color="black";
}
}
</script>

</body>
</html>
