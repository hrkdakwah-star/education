<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Robux Ultra Pro</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow-x:hidden;
}

header{
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
background:linear-gradient(90deg,#2563eb,#7c3aed);
letter-spacing:1px;
}

#welcome{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#2563eb,#7c3aed);
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

button{
background:#2563eb;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.container{
display:none;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

.back{
background:#475569;
margin-bottom:15px;
}

.total-box{
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<header>💎 TOKO ROBUX ULTRA PRO</header>

<div id="welcome">
<h1>Selamat Datang 👋</h1>
<p>Top Up Robux Aman & Cepat</p>
<button onclick="enterShop()">Masuk</button>
</div>

<div class="container" id="shop">

<button class="back" onclick="goHome()">⬅ Kembali</button>

<h2>Username Roblox</h2>
<input type="text" id="username" placeholder="Masukkan Username Roblox">

<h2>Pilih Paket Robux</h2>

<div class="card">
<h3>80 Robux</h3>
<p>Rp15.000</p>
<button onclick="add(15000,'80 Robux')">Pilih</button>
</div>

<div class="card">
<h3>400 Robux</h3>
<p>Rp65.000</p>
<button onclick="add(65000,'400 Robux')">Pilih</button>
</div>

<div class="card">
<h3>800 Robux</h3>
<p>Rp120.000</p>
<button onclick="add(120000,'800 Robux')">Pilih</button>
</div>

<div class="card">
<h3>1700 Robux</h3>
<p>Rp240.000</p>
<button onclick="add(240000,'1700 Robux')">Pilih</button>
</div>

<div class="total-box">
Total: Rp <span id="total">0</span>
</div>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<script>

let total=0;
let paket=[];

function enterShop(){
document.getElementById("welcome").style.display="none";
document.getElementById("shop").style.display="block";
alert("Selamat datang di Toko Robux Ultra Pro 🔥");
}

function goHome(){
document.getElementById("shop").style.display="none";
document.getElementById("welcome").style.display="flex";
}

function add(harga,nama){
paket.push(nama);
total+=harga;
document.getElementById("total").innerText=total;
}

function checkout(){
let user=document.getElementById("username").value;

if(user==""){
alert("Masukkan username dulu!");
return;
}

if(total==0){
alert("Pilih paket dulu!");
return;
}

let pesan="Halo Admin Toko Robux%0A";
pesan+="Username: "+user+"%0A";
pesan+="Pesanan: "+paket.join(", ")+"%0A";
pesan+="Total: Rp "+total;

window.open("https://wa.me/6285716075774?text="+pesan);
}

</script>

</body>
</html>
