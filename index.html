<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Memasak: Bakso & Mie Ayam</title>
    <style>
        /* === RESET & VARIABEL CSS === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        :root {
            --primary: #FF7B54;
            --secondary: #FFB26B;
            --accent: #FFD56F;
            --bg-color: #FFF2CC;
            --text-dark: #4A4A4A;
            --danger: #FF4B4B;
            --success: #4CAF50;
        }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* === CONTAINER UTAMA === */
        #game-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 850px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* === HEADER (SKOR & WAKTU) === */
        #header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* === AREA PELANGGAN (ATAS) === */
        #customer-area {
            flex: 1;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
            position: relative;
        }

        .speech-bubble {
            background: white;
            padding: 15px;
            border-radius: 20px;
            border-bottom-left-radius: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 15px;
            max-width: 80%;
            animation: popIn 0.3s ease-out;
            display: none; /* Disembunyikan sampai game mulai */
        }

        .speech-bubble h3 {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .speech-bubble p {
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        #customer-avatar {
            font-size: 6rem;
            transition: transform 0.3s;
            display: none;
        }

        /* Timer Kesabaran */
        #patience-container {
            width: 150px;
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        #patience-bar {
            height: 100%;
            width: 100%;
            background-color: var(--success);
            transition: width 0.1s linear, background-color 0.3s;
        }

        /* === AREA DAPUR (BAWAH) === */
        #kitchen-area {
            height: 50%;
            background-color: #8B4513; /* Warna meja kayu */
            border-top: 5px solid #5C2E0B;
            display: flex;
            flex-direction: column;
        }

        /* Area Racikan (Meja Saji) */
        #prep-area {
            height: 40%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #prep-area:active {
            transform: scale(0.95);
        }

        #serving-bowl {
            width: 120px;
            height: 120px;
            background-color: #fff;
            border: 4px solid #ccc;
            border-radius: 50%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 10px;
            font-size: 1.5rem;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.3);
        }

        .serve-hint {
            position: absolute;
            bottom: 5px;
            color: white;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Tombol Buang */
        #trash-btn {
            position: absolute;
            right: 20px;
            bottom: 20px;
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Papan Bahan Makanan */
        #ingredients-board {
            flex: 1;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background-color: #A0522D;
        }

        .ingredient-btn {
            background-color: var(--accent);
            border: 2px solid #E6B800;
            border-radius: 10px;
            font-size: 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #CC9900;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .ingredient-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #CC9900;
        }

        .ingredient-btn span {
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 5px;
            color: var(--text-dark);
        }

        /* === MODAL & POP-UP === */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            animation: popIn 0.3s ease-out;
        }

        .modal h2 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .modal p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .btn-start {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Animasi */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .floating {
            animation: float 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-overlay" class="overlay">
        <div class="modal">
            <h2 id="modal-title">Warung Nusantara</h2>
            <p id="modal-desc">Layani pesanan pelanggan dengan urutan bahan yang tepat sebelum mereka marah!</p>
            <button class="btn-start" id="start-btn">Mulai Masak!</button>
        </div>
    </div>

    <div id="header">
        <div>Koin: <span id="score-display">0</span> 🪙</div>
        <div>Waktu: <span id="time-display">60</span>s ⏳</div>
    </div>

    <div id="customer-area">
        <div class="speech-bubble" id="speech-bubble">
            <h3 id="order-name">Pesanan</h3>
            <p id="order-hint">Resep</p>
        </div>
        <div id="customer-avatar" class="floating">🧕</div>
        <div id="patience-container">
            <div id="patience-bar"></div>
        </div>
    </div>

    <div id="kitchen-area">
        <div id="prep-area" onclick="serveFood()">
            <div id="serving-bowl"></div>
            <span class="serve-hint">Ketuk Mangkuk untuk Menyajikan</span>
            <button id="trash-btn" onclick="trashFood(event)">🗑️</button>
        </div>

        <div id="ingredients-board">
            <div class="ingredient-btn" onclick="addIngredient('mangkuk', '🥣')">🥣<span>Mangkuk</span></div>
            <div class="ingredient-btn" onclick="addIngredient('bakso', '🧆')">🧆<span>Bakso</span></div>
            <div class="ingredient-btn" onclick="addIngredient('mie', '🍝')">🍝<span>Mie</span></div>
            <div class="ingredient-btn" onclick="addIngredient('sawi', '🥬')">🥬<span>Sawi</span></div>
            <div class="ingredient-btn" onclick="addIngredient('pangsit', '🥟')">🥟<span>Pangsit</span></div>
            <div class="ingredient-btn" onclick="addIngredient('kuah', '🍲')">🍲<span>Kuah</span></div>
            <div class="ingredient-btn" onclick="addIngredient('sambal', '🌶️')">🌶️<span>Sambal</span></div>
            <div class="ingredient-btn" onclick="addIngredient('saus', '🍅')">🍅<span>Saus</span></div>
        </div>
    </div>
</div>

<script>
    /** * ==========================================
     * BAGIAN LOGIKA & PENGATURAN GAME
     * ==========================================
     * Logika ini mengatur cara kerja game, seperti resep, 
     * timer pelanggan, skor, dan pendeteksian urutan klik.
     */

    // 1. Data Resep Makanan (Array berisi urutan kode bahan)
    const recipes = {
        "Bakso Lengkap": {
            ingredients: ["mangkuk", "bakso", "sawi", "pangsit", "kuah"],
            hint: "(Mangkuk ➔ Bakso ➔ Sawi ➔ Pangsit ➔ Kuah)",
            reward: 20
        },
        "Mie Ayam": {
            ingredients: ["mangkuk", "mie", "sawi", "pangsit", "kuah"],
            hint: "(Mangkuk ➔ Mie ➔ Sawi ➔ Pangsit ➔ Kuah)",
            reward: 20
        }
    };

    // Varian avatar pelanggan yang akan muncul secara acak
    const avatars = ["🧕", "👨‍💼", "👩‍🎓", "👲", "👨‍🏫"];

    // 2. Variabel State (Penyimpan status game saat ini)
    let score = 0;
    let gameTime = 60; // Total waktu main dalam detik
    let gameInterval;
    
    let currentBowl = []; // Array untuk menampung bahan yang sedang diracik pemain
    let currentBowlEmojis = []; // Hanya untuk visual mangkuk

    let currentOrderName = "";
    let patienceTime = 100; // Persentase kesabaran (0-100)
    let patienceInterval;

    // 3. Mengambil elemen HTML untuk diubah menggunakan JavaScript
    const scoreDisplay = document.getElementById("score-display");
    const timeDisplay = document.getElementById("time-display");
    const overlay = document.getElementById("screen-overlay");
    const modalTitle = document.getElementById("modal-title");
    const modalDesc = document.getElementById("modal-desc");
    const startBtn = document.getElementById("start-btn");

    const customerAvatar = document.getElementById("customer-avatar");
    const speechBubble = document.getElementById("speech-bubble");
    const orderNameDisplay = document.getElementById("order-name");
    const orderHintDisplay = document.getElementById("order-hint");
    
    const patienceContainer = document.getElementById("patience-container");
    const patienceBar = document.getElementById("patience-bar");
    const servingBowl = document.getElementById("serving-bowl");

    // Event Listener untuk Tombol Mulai
    startBtn.addEventListener("click", startGame);

    /**
     * ==========================================
     * FUNGSI-FUNGSI UTAMA GAME
     * ==========================================
     */

    // Blok Fungsi: Memulai Game Baru
    function startGame() {
        // Reset semua status/variabel ke awal
        score = 0;
        gameTime = 60;
        scoreDisplay.innerText = score;
        timeDisplay.innerText = gameTime;
        
        overlay.style.display = "none"; // Sembunyikan layar menu
        customerAvatar.style.display = "block";
        speechBubble.style.display = "block";
        patienceContainer.style.display = "block";
        
        clearBowl(); // Kosongkan mangkuk dapur
        spawnCustomer(); // Munculkan pelanggan pertama

        // Jalankan timer utama game (berkurang 1 setiap 1000ms / 1 detik)
        gameInterval = setInterval(() => {
            gameTime--;
            timeDisplay.innerText = gameTime;
            
            if (gameTime <= 0) {
                endGame(); // Jika waktu habis, panggil fungsi endGame
            }
        }, 1000);
    }

    // Blok Fungsi: Memunculkan Pelanggan Baru & Pesanannya
    function spawnCustomer() {
        // Hentikan timer kesabaran sebelumnya jika ada
        clearInterval(patienceInterval);

        // Pilih pesanan acak ("Bakso Lengkap" atau "Mie Ayam")
        const recipeKeys = Object.keys(recipes);
        currentOrderName = recipeKeys[Math.floor(Math.random() * recipeKeys.length)];
        
        // Pilih avatar acak
        customerAvatar.innerText = avatars[Math.floor(Math.random() * avatars.length)];
        
        // Tampilkan pesanan di balon teks
        orderNameDisplay.innerText = currentOrderName;
        orderHintDisplay.innerText = recipes[currentOrderName].hint;

        // Reset kesabaran pelanggan
        patienceTime = 100;
        updatePatienceBar();

        // Jalankan animasi pop-in agar terasa dinamis
        customerAvatar.style.animation = 'none';
        speechBubble.style.animation = 'none';
        setTimeout(() => {
            customerAvatar.style.animation = 'popIn 0.3s ease-out';
            speechBubble.style.animation = 'popIn 0.3s ease-out';
        }, 10);

        // Kurangi kesabaran secara perlahan
        patienceInterval = setInterval(() => {
            patienceTime -= 2; // Kecepatan pelanggan marah (bisa disesuaikan)
            updatePatienceBar();

            if (patienceTime <= 0) {
                // Pelanggan pergi karena marah
                clearInterval(patienceInterval);
                customerAvatar.innerText = "😤"; // Ubah wajah
                setTimeout(() => {
                    spawnCustomer(); // Ganti pelanggan baru setelah 1 detik
                }, 1000);
            }
        }, 300);
    }

    // Blok Fungsi: Visualisasi Bar Kesabaran
    function updatePatienceBar() {
        patienceBar.style.width = patienceTime + "%";
        // Ubah warna bar menjadi merah jika hampir habis
        if (patienceTime > 50) {
            patienceBar.style.backgroundColor = "var(--success)";
        } else if (patienceTime > 25) {
            patienceBar.style.backgroundColor = "var(--accent)";
        } else {
            patienceBar.style.backgroundColor = "var(--danger)";
        }
    }

    // Blok Fungsi: Menambahkan Bahan ke Mangkuk (Saat Tombol Ditekan)
    function addIngredient(itemId, emoji) {
        // Cegah menambahkan bahan jika melebihi kapasitas visual (maksimal 6 item)
        if (currentBowl.length >= 6) return;

        // Masukkan id bahan ke array logika, dan emoji ke array visual
        currentBowl.push(itemId);
        currentBowlEmojis.push(emoji);

        renderBowl(); // Perbarui tampilan mangkuk
    }

    // Blok Fungsi: Merender (menggambar ulang) isi mangkuk di layar
    function renderBowl() {
        servingBowl.innerHTML = currentBowlEmojis.join(" ");
    }

    // Blok Fungsi: Membuang Racikan yang Salah
    function trashFood(event) {
        event.stopPropagation(); // Mencegah klik menembus ke elemen prep-area (menyajikan)
        clearBowl();
    }

    // Blok Fungsi: Mengosongkan Mangkuk
    function clearBowl() {
        currentBowl = [];
        currentBowlEmojis = [];
        renderBowl();
    }

    // Blok Fungsi: Menyajikan Makanan ke Pelanggan (Validasi Logika)
    function serveFood() {
        // Jika mangkuk masih kosong, abaikan klik
        if (currentBowl.length === 0) return;

        // Ambil array resep yang benar berdasarkan pesanan pelanggan saat ini
        const correctRecipe = recipes[currentOrderName].ingredients;

        // Cek apakah racikan pemain (currentBowl) sama persis dengan resep (correctRecipe)
        if (checkArraysMatch(currentBowl, correctRecipe)) {
            // BENAR!
            score += recipes[currentOrderName].reward;
            scoreDisplay.innerText = score;
            
            // Animasi pelanggan senang
            customerAvatar.innerText = "😍";
            clearInterval(patienceInterval);
            
            // Buat pelanggan baru & bersihkan meja setelah jeda singkat
            setTimeout(() => {
                clearBowl();
                spawnCustomer();
            }, 500);

        } else {
            // SALAH! Animasi goyang (shake) untuk memberi tahu pemain
            servingBowl.style.transform = "translateX(-10px)";
            setTimeout(() => servingBowl.style.transform = "translateX(10px)", 100);
            setTimeout(() => servingBowl.style.transform = "translateX(0)", 200);
        }
    }

    // Blok Fungsi Helper: Mengecek apakah 2 Array isinya sama persis secara berurutan
    function checkArraysMatch(arr1, arr2) {
        if (arr1.length !== arr2.length) return false;
        for (let i = 0; i < arr1.length; i++) {
            if (arr1[i] !== arr2[i]) return false;
        }
        return true;
    }

    // Blok Fungsi: Mengakhiri Permainan
    function endGame() {
        clearInterval(gameInterval);
        clearInterval(patienceInterval);
        
        // Tampilkan kembali menu overlay dengan hasil akhir
        overlay.style.display = "flex";
        modalTitle.innerText = "Waktu Habis!";
        modalDesc.innerHTML = `Luar biasa!<br>Kamu mengumpulkan <strong>${score} Koin</strong>.`;
        startBtn.innerText = "Main Lagi";
        
        // Sembunyikan elemen pelanggan sementara
        customerAvatar.style.display = "none";
        speechBubble.style.display = "none";
        patienceContainer.style.display = "none";
    }

</script>
</body>
</html>
