<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Masakan Indonesia - Bakso & Mie Ayam</title>
    <style>
        :root {
            --wood-color: #8B5A2B;
            --table-color: #CD853F;
            --text-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            display: flex;
            justify-center: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 960px;
            height: 540px;
            background: linear-gradient(to bottom, #dff9fb, #ffffff);
            position: relative;
            border: 8px solid #222;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* --- BAGIAN ATAS: PELANGGAN & HUD --- */
        #top-section {
            height: 220px;
            position: relative;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f5f6fa"/><circle cx="50" cy="50" r="40" fill="%23f1f2f6" opacity="0.5"/></svg>');
            border-bottom: 5px solid #bdc581;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 16px;
            z-index: 10;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Pelanggan */
        #customer-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
            box-sizing: border-box;
        }

        .customer {
            width: 100px;
            height: 140px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: walkIn 0.5s ease-out;
        }

        @keyframes walkIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: #ff7675;
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .avatar.hijab { background: #74b9ff; }
        .avatar.pria { background: #ffeaa7; }

        .order-bubble {
            position: absolute;
            top: -65px;
            background: white;
            padding: 6px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #fdcb6e;
        }
        .order-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: white transparent;
        }

        .patience-bar {
            width: 60px;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        .patience-fill {
            width: 100%;
            height: 100%;
            background: #2ecc71;
            transition: width 0.1s linear, background-color 0.5s;
        }

        /* --- BAGIAN BAWAH: MEJA MASAK (DAPUR) --- */
        #kitchen-table {
            height: 320px;
            background: linear-gradient(135deg, var(--table-color), var(--wood-color));
            border-top: 8px solid #5c3a21;
            padding: 15px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 15px;
            position: relative;
        }

        .kitchen-section {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            border: 2px dashed rgba(255,255,255,0.3);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: center;
            justify-content: center;
        }

        .section-title {
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        /* Bahan Mentah / Bahan Pelengkap */
        .ingredient-btn {
            width: 75px;
            height: 75px;
            background: #f8f9fa;
            border: 3px solid #bdc3c7;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 #bdc3c7;
        }
        .ingredient-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #bdc3c7;
        }
        .ingredient-btn span { font-size: 28px; margin-bottom: 2px; }

        /* Area Racikan (Mangkok) */
        .assembly-slot {
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border: 3px solid #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .assembly-slot.active { background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23fff" stroke="%23e74c3c" stroke-width="4"/></svg>') no-repeat center; background-size: contain; }

        .bowl-content {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            color: #2c3e50;
            pointer-events: none;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Banner Masakan Indonesia */
        #banner {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #e74c3c;
            color: white;
            text-align: center;
            font-weight: 900;
            font-size: 24px;
            padding: 5px 0;
            letter-spacing: 2px;
            border-top: 3px solid #f1c40f;
            text-shadow: 2px 2px 0px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .flag { width: 30px; height: 20px; background: linear-gradient(to bottom, red 50%, white 50%); border: 1px solid #ddd; }

        /* Game Over / Win Overlay */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }
        #overlay h1 { font-size: 48px; margin-bottom: 10px; color: #f1c40f; }
        #overlay button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #27ae60;
        }
        #overlay button:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="top-section">
            <div id="hud">
                <div class="hud-item">💰 Pendapatan: <span id="score">Rp 0</span></div>
                <div class="hud-item">🎯 Target: <span id="target">Rp 100.000</span></div>
                <div class="hud-item">⏱️ Waktu: <span id="timer">60</span>s</div>
            </div>

            <div id="customer-area">
                </div>
        </div>

        <div id="kitchen-table">
            
            <div class="kitchen-section">
                <div class="section-title">Bahan Pokok</div>
                <button class="ingredient-btn" onclick="addIngredient('Mie')"><span>🍜</span>Mie</button>
                <button class="ingredient-btn" onclick="addIngredient('Bihun')"><span>⚪</span>Bihun</button>
            </div>

            <div class="kitchen-section">
                <div class="section-title">Mangkok Racikan (Klik untuk Sajikan / Kosongkan)</div>
                <div class="assembly-slot" id="slot-0" onclick="handleSlotClick(0)">
                    <div class="bowl-content" id="content-0">Kosong</div>
                </div>
                <div class="assembly-slot" id="slot-1" onclick="handleSlotClick(1)">
                    <div class="bowl-content" id="content-1">Kosong</div>
                </div>
                <div class="assembly-slot" id="slot-2" onclick="handleSlotClick(2)">
                    <div class="bowl-content" id="content-2">Kosong</div>
                </div>
            </div>

            <div class="kitchen-section">
                <div class="section-title">Topping & Lauk</div>
                <button class="ingredient-btn" onclick="addIngredient('Bakso')"><span>🥩</span>Bakso</button>
                <button class="ingredient-btn" onclick="addIngredient('Pangsit')"><span>📐</span>Pangsit</button>
                <button class="ingredient-btn" onclick="addIngredient('Sayur')"><span>🥬</span>Sayur</button>
                <button class="ingredient-btn" onclick="addIngredient('Sambal')"><span>🌶️</span>Sambal</button>
            </div>

            <div id="banner">
                <div class="flag"></div>
                MASAKAN INDONESIA
                <div class="flag"></div>
            </div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">GAME OVER</h1>
            <p id="overlay-desc">Skor Akhir Anda: Rp 0</p>
            <button onclick="restartGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'success') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'fail') {
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }
    </script>

    <script>
        // State Konfigurasi Game
        let score = 0;
        let timeLeft = 60;
        const targetScore = 100000;
        let gameInterval;
        let customerInterval;
        let activeSlot = 0; // Mangkok yang sedang aktif dipilih untuk diisi

        // Variabel Data Hidangan
        const menuRecipes = {
            "Bakso Biasa": ["Bihun", "Bakso", "Sayur"],
            "Mie Ayam Pangsit": ["Mie", "Pangsit", "Sayur"],
            "Bakso Komplit": ["Mie", "Bihun", "Bakso", "Pangsit", "Sayur"],
            "Bakso Pedas": ["Bihun", "Bakso", "Sayur", "Sambal"]
        };
        const menuPrices = {
            "Bakso Biasa": 15000,
            "Mie Ayam Pangsit": 18000,
            "Bakso Komplit": 25000,
            "Bakso Pedas": 17000
        };

        // Data Slot Mangkok di Meja Racik
        let slots = [
            { ingredients: [], active: true },
            { ingredients: [], active: false },
            { ingredients: [], active: false }
        ];

        let customers = [];
        const maxCustomers = 3;

        // Inisialisasi Game
        function startGame() {
            score = 0;
            timeLeft = 60;
            slots = [
                { ingredients: [], active: true },
                { ingredients: [], active: false },
                { ingredients: [], active: false }
            ];
            activeSlot = 0;
            customers = [];
            
            document.getElementById('score').innerText = "Rp " + score.toLocaleString('id-ID');
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('overlay').style.display = 'none';
            
            updateSlotUI();
            
            // Core loops
            gameInterval = setInterval(updateTimer, 1000);
            customerInterval = setInterval(spawnCustomer, 3500);
            
            // Munculkan pelanggan pertama langsung
            spawnCustomer();
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        // Fungsi Memasukkan Bahan ke Mangkok Aktif
        function addIngredient(ing) {
            playSound('click');
            let currentSlot = slots[activeSlot];
            if (!currentSlot.ingredients.includes(ing)) {
                currentSlot.ingredients.push(ing);
                updateSlotUI();
            }
        }

        // Update visualisasi mangkok racikan
        function updateSlotUI() {
            for (let i = 0; i < 3; i++) {
                const slotEl = document.getElementById(`slot-${i}`);
                const contentEl = document.getElementById(`content-${i}`);
                
                // Set kelas aktif sorotan
                if (i === activeSlot) {
                    slotEl.style.borderColor = '#f1c40f';
                    slotEl.style.boxShadow = '0 0 15px #f1c40f';
                } else {
                    slotEl.style.borderColor = '#fff';
                    slotEl.style.boxShadow = 'none';
                }

                if (slots[i].ingredients.length === 0) {
                    contentEl.innerHTML = "<span style='color:#bbb;'>Kosong</span>";
                    slotEl.classList.remove('active');
                } else {
                    contentEl.innerHTML = slots[i].ingredients.join("<br>");
                    slotEl.classList.add('active');
                }
            }
        }

        // Klik slot untuk ganti fokus mangkok atau buang masakan jika double klik / alternatif
        function handleSlotClick(index) {
            if (activeSlot === index) {
                // Jika klik mangkok yang sama dan isinya ada, kita asumsikan sedang mencocokkan pesanan pelanggan
                checkServe(index);
            } else {
                activeSlot = index;
                updateSlotUI();
            }
        }

        // Logika Pelanggan
        function spawnCustomer() {
            if (customers.length >= maxCustomers) return;

            const menuKeys = Object.keys(menuRecipes);
            const randomMenu = menuKeys[Math.floor(Math.random() * menuKeys.length)];
            const types = ['hijab', 'pria'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            const emojis = randomType === 'hijab' ? '🧕' : '👨';

            const customer = {
                id: Date.now() + Math.random(),
                menu: randomMenu,
                patience: 100,
                type: randomType,
                emoji: emojis
            };

            customers.push(customer);
            renderCustomers();
        }

        function renderCustomers() {
            const area = document.getElementById('customer-area');
            area.innerHTML = '';

            customers.forEach(c => {
                const custEl = document.createElement('div');
                custEl.className = 'customer';
                
                custEl.innerHTML = `
                    <div class="order-bubble"> minta:<br>🛒 ${c.menu}</div>
                    <div class="avatar ${c.type}">${c.emoji}</div>
                    <div class="patience-bar">
                        <div class="patience-fill" id="patience-${c.id}" style="width: ${c.patience}%"></div>
                    </div>
                `;
                area.appendChild(custEl);
            });
        }

        // Loop untuk mengurangi kesabaran pelanggan secara real-time
        setInterval(() => {
            if (timeLeft <= 0) return;
            
            let burnedCustomer = false;
            customers.forEach(c => {
                c.patience -= 2.5; // Mengurangi bar kesabaran
                const fillEl = document.getElementById(`patience-${c.id}`);
                if (fillEl) {
                    fillEl.style.width = c.patience + '%';
                    if (c.patience < 30) fillEl.style.backgroundColor = '#e74c3c';
                    else if (c.patience < 60) fillEl.style.backgroundColor = '#f39c12';
                }

                if (c.patience <= 0) {
                    burnedCustomer = true;
                }
            });

            if (burnedCustomer) {
                customers = customers.filter(c => c.patience > 0);
                playSound('fail');
                renderCustomers();
            }
        }, 500);

        // Logika Menyajikan Makanan ke Pelanggan
        function checkServe(slotIndex) {
            const cookedIngredients = slots[slotIndex].ingredients;
            if (cookedIngredients.length === 0) return;

            // Cari apakah ada pelanggan yang pesanannya cocok dengan racikan di mangkok
            let matchIndex = -1;
            for (let i = 0; i < customers.length; i++) {
                const targetRecipe = menuRecipes[customers[i].menu];
                
                // Validasi kecocokan isi bahan (tanpa memandang urutan pembuatan)
                const isMatch = targetRecipe.length === cookedIngredients.length &&
                                targetRecipe.every(ing => cookedIngredients.includes(ing));

                if (isMatch) {
                    matchIndex = i;
                    break;
                }
            }

            if (matchIndex : text !== -1) {
                // Berhasil menyajikan masakan yang tepat!
                const servedMenu = customers[matchIndex].menu;
                score += menuPrices[servedMenu];
                document.getElementById('score').innerText = "Rp " + score.toLocaleString('id-ID');
                
                // Hapus pelanggan dan bersihkan mangkok
                customers.splice(matchIndex, 1);
                slots[slotIndex].ingredients = [];
                
                playSound('success');
                renderCustomers();
                updateSlotUI();
            } else {
                // Salah resep, reset/buang isi mangkok secara otomatis
                slots[slotIndex].ingredients = [];
                playSound('fail');
                updateSlotUI();
                alert("Waduh! Isian racikan tidak sesuai pesanan pembeli mana pun. Makanan terbuang!");
            }
        }

        // Selesai Game
        function endGame() {
            clearInterval(gameInterval);
            clearInterval(customerInterval);
            
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('overlay-title');
            const desc = document.getElementById('overlay-desc');
            
            overlay.style.display = 'flex';
            desc.innerText = "Pendapatan Warung Anda: Rp " + score.toLocaleString('id-ID');
            
            if (score >= targetScore) {
                title.innerText = "SELAMAT! ANDA MENANG";
                title.style.color = '#2ecc71';
            } else {
                title.innerText = "WAKTU HABIS!";
                title.style.color = '#e74c3c';
            }
        }

        function restartGame() {
            startGame();
        }

        // Memulai game saat pertama kali dimuat
        window.onload = startGame;
    </script>
</body>
</html>
