<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRK Robux Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
    background:linear-gradient(135deg,#0f0f1a,#181830);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    width:95%;
    max-width:520px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 50px rgba(0,0,0,0.6);
}
h1{text-align:center;font-size:26px;font-weight:800;}
.subtitle{text-align:center;font-size:13px;opacity:0.7;margin-bottom:15px;}
.stock{
    text-align:center;
    margin-bottom:20px;
    background:#1a1a2e;
    padding:10px;
    border-radius:12px;
    font-size:14px;
}
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#6a5cff,#8f7bff);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
button:hover{transform:scale(1.04);}
.hidden{display:none;}
input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    margin-top:15px;
    background:#1f1f35;
    color:white;
    font-size:16px;
}
.result{
    margin-top:20px;
    background:#1a1a2e;
    padding:15px;
    border-radius:14px;
    font-size:14px;
}
.badges{
    margin-top:20px;
    text-align:center;
    font-size:12px;
    opacity:0.6;
}
.footer{
    margin-top:15px;
    text-align:center;
    font-size:12px;
    opacity:0.4;
}
</style>
</head>
<body>

<div class="container">
    <h1>HRK Robux Store</h1>
    <div class="subtitle">Safe • Custom Amount • Official System</div>

    <div class="stock">
        🟢 Stok Robux Tersedia: <b id="stockDisplay">327.987</b>
    </div>

    <!-- STEP 1 -->
    <button onclick="showStep2()">BELI ROBUX</button>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
        <input type="number" id="robuxInput" placeholder="Masukkan jumlah Robux (min 50)">
        <button onclick="calculate()">LANJUTKAN</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hidden">
        <div class="result">
            Total Harga <span id="price">Rp0</span><br><br>
            Robux Gamepass <span id="gamepass">0 Robux</span>
        </div>
        <button onclick="buy()">KONFIRMASI & CHAT ADMIN</button>
    </div>

    <div class="badges">
        🔒 No Login Required<br>
        🛡️ Via Sistem Resmi Roblox<br>
        ⏳ Estimasi 1–5 Hari
    </div>

    <div class="footer">
        Minimal 50 Robux • 1 Robux = Rp132
    </div>
</div>

<script>
const pricePerRobux = 132;
const minPurchase = 50;
let stock = 327987;

function formatRupiah(num){
    return "Rp" + num.toLocaleString("id-ID");
}

function showStep2(){
    document.getElementById("step2").classList.remove("hidden");
}

function calculate(){
    let robux = parseInt(document.getElementById("robuxInput").value);

    if(isNaN(robux) || robux < minPurchase){
        alert("Minimal pembelian 50 Robux.");
        return;
    }

    if(robux > stock){
        alert("Stok tidak mencukupi.");
        return;
    }

    let totalPrice = robux * pricePerRobux;
    let gamepassRobux = Math.ceil(robux / 0.7);

    document.getElementById("price").innerText = formatRupiah(totalPrice);
    document.getElementById("gamepass").innerText = gamepassRobux + " Robux";

    document.getElementById("step3").classList.remove("hidden");
}

function buy(){
    let robux = parseInt(document.getElementById("robuxInput").value);
    let totalPrice = robux * pricePerRobux;
    let gamepassRobux = Math.ceil(robux / 0.7);

    let message = `Halo Admin, saya ingin membeli ${robux} Robux.\nTotal Harga: ${formatRupiah(totalPrice)}\nRobux Gamepass: ${gamepassRobux} Robux\nUsername Roblox:`;

    let phone = "6285716075774"; // GANTI NOMOR
    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
