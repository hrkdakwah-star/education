<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITANBUX | Professional Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa3;
            --bg-dark: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: white; overflow-x: hidden; }

        /* --- LOADING SPINNER --- */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LAYOUT --- */
        header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .stock-badge { background: rgba(0,255,163,0.1); color: var(--primary); padding: 6px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(0,255,163,0.2); }

        .container { max-width: 500px; margin: 20px auto 140px auto; padding: 0 20px; display: none; opacity: 0; transition: 0.5s; }

        /* --- UI CARDS --- */
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 22px; backdrop-filter: blur(10px); margin-bottom: 15px; }
        .card-label { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); margin-bottom: 12px; display: block; }

        input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); 
            padding: 16px; border-radius: 16px; color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        /* --- PRESET BUTTONS --- */
        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .btn-preset { 
            background: var(--glass); border: 1px solid var(--border); padding: 15px; 
            border-radius: 15px; color: white; cursor: pointer; transition: 0.2s; font-weight: 700;
        }
        .btn-preset:active { transform: scale(0.95); }
        .btn-preset.active { border-color: var(--primary); background: rgba(0,255,163,0.05); color: var(--primary); }

        /* --- PAYMENT SELECTOR --- */
        .pay-row { display: flex; gap: 10px; margin-top: 10px; }
        .pay-item { 
            flex: 1; background: var(--glass); border: 1.5px solid var(--border); 
            padding: 12px; border-radius: 14px; text-align: center; cursor: pointer; opacity: 0.6;
        }
        .pay-item.active { border-color: var(--primary); opacity: 1; background: rgba(0,255,163,0.05); }
        .pay-item img { height: 18px; filter: brightness(0) invert(1); }

        /* --- BOTTOM NAV --- */
        #bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(5,7,10,0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); padding: 20px 25px 40px;
            display: flex; justify-content: space-between; align-items: center;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #bottom-nav.show { transform: translateY(0); }

        .btn-main { 
            background: var(--primary); color: black; border: none; padding: 16px 30px; 
            border-radius: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,255,163,0.2);
        }

        /* --- SUCCESS PAGE --- */
        #success-page { display: none; text-align: center; padding: 40px 20px; }
        .icon-check { width: 80px; height: 80px; background: var(--primary); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 20px; }

    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600; color: var(--text-dim); letter-spacing: 2px;">SECURE CONNECTION</p>
    </div>

    <header>
        <div style="font-weight: 800; font-size: 1.2rem;">TITAN<span>BUX</span></div>
        <div class="stock-badge">Stok: <span id="stok-num">142.350</span></div>
    </header>

    <div class="container" id="main-content">
        
        <div class="card">
            <span class="card-label">STEP 1: IDENTITAS</span>
            <input type="text" id="username" placeholder="Masukkan Username Roblox..." oninput="checkInput()">
        </div>

        <div class="card">
            <span class="card-label">STEP 2: PILIH JUMLAH</span>
            <input type="number" id="custom-qty" placeholder="Jumlah kustom (min. 50)" oninput="recalc('custom')">
            
            <div class="preset-grid">
                <button class="btn-preset" onclick="setPreset(400, this)">400 RBX</button>
                <button class="btn-preset" onclick="setPreset(800, this)">800 RBX</button>
                <button class="btn-preset" onclick="setPreset(1000, this)">1000 RBX</button>
                <button class="btn-preset" onclick="setPreset(2000, this)">2000 RBX</button>
            </div>
        </div>

        <div class="card">
            <span class="card-label">STEP 3: PEMBAYARAN</span>
            <div class="pay-row">
                <div class="pay-item active" onclick="setPay('DANA', this)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dan_dana_id.svg" alt="DANA">
                </div>
                <div class="pay-item" onclick="setPay('QRIS', this)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" alt="QRIS">
                </div>
                <div class="pay-item" onclick="setPay('GOPAY', this)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GOPAY">
                </div>
            </div>
        </div>

    </div>

    <div id="success-page">
        <div class="icon-check">✓</div>
        <h2>Order Generated!</h2>
        <p style="color: var(--text-dim); margin: 15px 0 30px;">ID: <span id="order-id" style="color: white; font-weight: 700;">-</span></p>
        <button class="btn-main" style="width: 100%;" onclick="sendWA()">KIRIM KE WHATSAPP</button>
    </div>

    <div id="bottom-nav">
        <div>
            <div style="font-size: 0.7rem; color: var(--text-dim);">Total Harga</div>
            <div id="total-price" style="font-size: 1.3rem; font-weight: 800; color: var(--primary);">Rp 0</div>
        </div>
        <button class="btn-main" onclick="processOrder()">Beli Sekarang</button>
    </div>

    <script>
        const RATE = 132;
        let db = { user: "", qty: 0, total: 0, pay: "DANA", id: "" };
        let stok = 142350;

        // 1. Loading Function (1 Detik)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    const main = document.getElementById('main-content');
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 500);
            }, 1000); // 1 Detik muter
        });

        // 2. Logic Stok
        setInterval(() => {
            stok -= Math.floor(Math.random() * 3);
            document.getElementById('stok-num').innerText = stok.toLocaleString('id-ID');
        }, 5000);

        // 3. Input Checker (Show/Hide Bottom Bar)
        function checkInput() {
            const user = document.getElementById('username').value;
            const nav = document.getElementById('bottom-nav');
            if (user.length >= 3 && db.qty >= 50) {
                nav.classList.add('show');
            } else {
                nav.classList.remove('show');
            }
            db.user = user;
        }

        function setPreset(val, el) {
            document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('custom-qty').value = val;
            recalc('preset', val);
        }

        function recalc(type, val = 0) {
            if(type === 'custom') {
                val = document.getElementById('custom-qty').value;
                document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
            }
            db.qty = val;
            db.total = val * RATE;
            document.getElementById('total-price').innerText = "Rp " + db.total.toLocaleString('id-ID');
            checkInput();
        }

        function setPay(method, el) {
            document.querySelectorAll('.pay-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            db.pay = method;
        }

        function processOrder() {
            db.id = "RBX-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('order-id').innerText = db.id;
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('bottom-nav').classList.remove('show');
            document.getElementById('success-page').style.display = 'block';
        }

        function sendWA() {
            const phone = "6285716075774";
            const msg = `🔥 *ORDER TITANBUX*\nID: ${db.id}\nUser: ${db.user}\nQty: ${db.qty} Robux\nMetode: ${db.pay}\nTotal: Rp${db.total.toLocaleString('id-ID')}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
