name: Full Supreme Sync
on:
  schedule:
    - cron: '0 */6 * * *' # Jalan otomatis setiap jam 12, 6, 18, 24
  workflow_dispatch:      # Tombol untuk jalankan manual
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with: { node-version: '18' }
      - run: npm install axios cheerio
      - name: Run Scraper
        run: node scraper.js
      - name: Save To Repo
        run: |
          git config --global user.name "Supreme-Bot"
          git config --global user.email "bot@supreme.com"
          git add data-value.json
          git commit -m "Auto Update Data Supreme" || exit 0
          git push
